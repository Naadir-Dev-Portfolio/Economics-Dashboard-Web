<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economics Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            color: #ffffff;
            font-weight: 600;
        }

        .subtitle {
            font-size: 1.5rem;
            color: #888;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .status {
            display: inline-block;
            padding: 8px 16px;
            background-color: rgba(255, 193, 7, 0.1);
            border: 1px solid #ffc107;
            border-radius: 4px;
            color: #ffc107;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .description {
            margin-top: 30px;
            color: #999;
            font-size: 1rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Economics Dashboard</h1>
        <p class="subtitle">Interactive Macro Data Visualization</p>
        <div class="status">In Development</div>
        <p class="description">
            A comprehensive platform for economic and macro data analysis.<br>
            Coming soon with live data integration and interactive charts.
        </p>
    </div>
</body>
</html>
